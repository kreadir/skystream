name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Dummy Assets Dir
        run: mkdir -p assets/plugins/

  android:
    name: Android Build
    needs: version
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Dependencies
        run: flutter pub get

      # Remove desktop TorrServer binaries to reduce APK size by ~170MB
      # These are only needed for macOS, Windows, and Linux
      - name: Strip Desktop Binaries
        run: rm -f packages/flutter_torrent_server/assets/torrserver/TorrServer-*
        
      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties
        
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Rename APKs
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd build/app/outputs/flutter-apk/
          for f in app-*-release.apk; do
            if [ -f "$f" ]; then
              if [ "$f" == "app-release.apk" ]; then
                mv "$f" "../../../../skystream-android-universal-${VERSION}.apk"
              else
                # Extract ABI: app-<abi>-release.apk -> <abi>
                abi="${f#app-}"
                abi="${abi%-release.apk}"
                mv "$f" "../../../../skystream-android-${abi}-${VERSION}.apk"
              fi
            fi
          done

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}

  ios:
    name: iOS Build (Unsigned)
    needs: version
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r skystream-ios-unsigned-${{ needs.version.outputs.version }}.ipa Payload
          
      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "skystream-ios-unsigned-${{ needs.version.outputs.version }}.ipa"
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Build
    needs: version
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
        include:
          - arch: arm64
            torrserver_binary: TorrServer-darwin-arm64
            xcode_arch: arm64
          - arch: x64
            torrserver_binary: TorrServer-darwin-amd64
            xcode_arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter config --enable-macos-desktop
          flutter pub get

      # Keep only the required TorrServer binary for this architecture
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          ls -la
          # Keep only the binary for this architecture
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete
          ls -la
          
      # Build for a single architecture to reduce app size from ~430MB (universal) to ~270MB
      - name: Build macOS (${{ matrix.arch }})
        run: |
          # First, generate the Xcode project with flutter
          flutter build macos --release --config-only
          
          # Build using xcodebuild with single architecture
          cd macos
          xcodebuild -workspace Runner.xcworkspace \
            -configuration Release \
            -scheme Runner \
            -derivedDataPath ../build/macos \
            ARCHS="${{ matrix.xcode_arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      # Re-sign all frameworks to fix media_kit MPV crash (Issue #830)
      # The frameworks built in CI have code signing issues that cause
      # assertion failures in mpv_render_context_create
      - name: Re-sign Frameworks
        run: |
          APP_PATH="build/macos/Build/Products/Release/skystream.app"
          FRAMEWORKS_PATH="$APP_PATH/Contents/Frameworks"
          
          echo "Re-signing frameworks..."
          find "$FRAMEWORKS_PATH" -name "*.framework" -type d | while read framework; do
            echo "Signing: $framework"
            codesign --force --deep --sign - "$framework"
          done
          
          # Also sign any dylibs
          find "$FRAMEWORKS_PATH" -name "*.dylib" -type f | while read dylib; do
            echo "Signing: $dylib"
            codesign --force --sign - "$dylib"
          done
          
          # Sign the main app
          echo "Signing app..."
          codesign --force --deep --sign - "$APP_PATH"
          
          echo "Done re-signing."
        
      # CRITICAL: Use -y flag to preserve symlinks!
      # macOS frameworks contain symlinks (e.g., Mpv.framework/Mpv -> Versions/A/Mpv)
      # Without -y, zip stores the file content instead of the symlink,
      # causing MPV's internal config to fail with assertion errors.
      - name: Zip Bundle
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd build/macos/Build/Products/Release
          zip -ry "../../../../../skystream-macos-${{ matrix.arch }}-${VERSION}.zip" skystream.app

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "skystream-macos-${{ matrix.arch }}-${{ needs.version.outputs.version }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Build
    needs: version
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get

      # Keep only the Windows TorrServer binary
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          Get-ChildItem -File | Where-Object { $_.Name -ne "TorrServer-windows-amd64.exe" } | Remove-Item
          Get-ChildItem
          
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Compress Release
        run: |
          $Version = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "skystream-windows-$Version.zip"

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "skystream-windows-${{ needs.version.outputs.version }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

  linux:
    name: Linux Build
    needs: version
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
          
      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-linux-desktop
          flutter pub get

      # Keep only the Linux TorrServer binary
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          ls -la
          find . -type f ! -name "TorrServer-linux-amd64" -delete
          ls -la
          
      - name: Build Linux
        run: flutter build linux --release
        
      - name: Compress Release
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../skystream-linux-${VERSION}.tar.gz" .

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "skystream-linux-${{ needs.version.outputs.version }}.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
